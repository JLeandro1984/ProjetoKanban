<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Controle de Projetos</title>
  <desc id="desc">Icone profissional para app Kanban com colunas e cards de post-it.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b6fd8" />
      <stop offset="100%" stop-color="#2fa0d8" />
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7c2" />
      <stop offset="100%" stop-color="#ffe98f" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0d2c52" flood-opacity="0.25" />
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)" />

  <rect x="96" y="124" width="320" height="264" rx="24" fill="#ffffff" opacity="0.96" filter="url(#shadow)" />

  <rect x="128" y="156" width="74" height="198" rx="14" fill="#eef3fb" />
  <rect x="219" y="156" width="74" height="198" rx="14" fill="#eef3fb" />
  <rect x="310" y="156" width="74" height="198" rx="14" fill="#eef3fb" />

  <g transform="translate(230 196) rotate(-5)">
    <rect x="0" y="0" width="96" height="96" rx="10" fill="url(#paper)" stroke="#d7b94d" stroke-width="3" />
    <rect x="30" y="-10" width="36" height="14" rx="4" fill="#f4f4f4" opacity="0.9" />
    <rect x="14" y="24" width="68" height="8" rx="4" fill="#d3b85e" opacity="0.7" />
    <rect x="14" y="42" width="52" height="8" rx="4" fill="#d3b85e" opacity="0.55" />
    <rect x="14" y="60" width="58" height="8" rx="4" fill="#d3b85e" opacity="0.45" />
  </g>
</svg>
